name: Daily IT News Update

on:
  schedule:
    # 毎朝 07:00 JST (UTC 22:00 前日) に自動実行
    - cron: "0 22 * * *"
  workflow_dispatch: {}  # GitHubの画面から手動実行も可能

permissions:
  contents: write  # コミット&プッシュするために必要

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch articles
        run: python scripts/crawler.py

      - name: Summarize with Gemini API (free tier)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/summarize.py

      - name: Generate HTML
        run: python scripts/generate.py

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          git diff --cached --quiet || git commit -m "chore: daily update $(date '+%Y-%m-%d')"
          git push